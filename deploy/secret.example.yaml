# EXAMPLE ONLY — do NOT commit real values in plaintext.
# The EKS team SOPS-encrypts the real Secret as selfie-secrets.enc.yaml in
# bdd/devops apps/selfie/ (age, like the other apps). Keys consumed via envFrom
# by selfie-api (see api-deployment.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: selfie-secrets
  namespace: selfie
type: Opaque
stringData:
  # Connection string to the PostgreSQL the EKS team provisions for this app.
  # The app runs migrations + seeds itself on startup, so an empty database is fine.
  DATABASE_URL: "postgres://selfie:CHANGE_ME@selfie-postgres.selfie.svc.cluster.local:5432/selfie"
  # Signs the admin-session cookie. Generate a long random value, e.g.:
  #   openssl rand -hex 32
  SESSION_SECRET: "CHANGE_ME_TO_A_LONG_RANDOM_VALUE"
  # Admin password for lunch-date scheduling (replaces the prototype "lunch2026").
  ADMIN_PASSWORD: "CHANGE_ME"
