server {
    listen 80;
    server_name _;
    # Photos are uploaded as data URLs inside the JSON body (~ up to 3 MB).
    client_max_body_size 8m;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Self-hosted assets + Google Fonts (stylesheet from googleapis, woff2 from gstatic).
    # style-src allows 'unsafe-inline' for the heavy use of React inline style={} props.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;

    # API → backend service. `selfie-api` resolves in both docker-compose
    # (service name) and Kubernetes (Service name) so this file is unchanged
    # across environments.
    location /api/ {
        proxy_pass http://selfie-api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Liveness/readiness probes routed through the public host hit the backend.
    location ~ ^/(health|ready)$ {
        proxy_pass http://selfie-api:3001;
        access_log off;
    }

    # Hashed Vite assets are immutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
